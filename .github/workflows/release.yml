name: Release macOS

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Parse version
        id: ver
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "tag=$TAG"         >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get

      - name: Build macOS
        run: |
          flutter build macos --release \
            --build-name="${{ steps.ver.outputs.version }}" \
            --build-number="${{ github.run_number }}"

      - name: Create ZIP
        id: zip
        run: |
          ZIP="WorkTimer-macOS-${{ steps.ver.outputs.version }}.zip"
          ditto -c -k --keepParent \
            "build/macos/Build/Products/Release/worktimer.app" \
            "$ZIP"
          echo "zip=$ZIP" >> "$GITHUB_OUTPUT"

      - name: Update appcast.xml
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          TAG="${{ steps.ver.outputs.tag }}"
          ZIP="${{ steps.zip.outputs.zip }}"
          DATE=$(date -u "+%a, %d %b %Y %H:%M:%S +0000")
          SIZE=$(stat -f%z "$ZIP")
          URL="https://github.com/leehjuu/worktimer/releases/download/${TAG}/${ZIP}"

          python3 - <<PYEOF
import xml.etree.ElementTree as ET

SPARKLE = 'http://www.andymatuschak.org/xml-namespaces/sparkle'
ET.register_namespace('sparkle', SPARKLE)

tree = ET.parse('appcast.xml')
root = tree.getroot()
channel = root.find('channel')

item = ET.Element('item')
ET.SubElement(item, 'title').text = 'Version $VERSION'
ET.SubElement(item, f'{{{SPARKLE}}}shortVersionString').text = '$VERSION'
ET.SubElement(item, f'{{{SPARKLE}}}os').text = 'macos'
ET.SubElement(item, 'description').text = 'GitHub Releases 페이지에서 변경사항을 확인하세요.'
ET.SubElement(item, 'pubDate').text = '$DATE'
enc = ET.SubElement(item, 'enclosure')
enc.set('url', '$URL')
enc.set('type', 'application/octet-stream')
enc.set('length', '$SIZE')

first_item = channel.find('item')
if first_item is not None:
    idx = list(channel).index(first_item)
    channel.insert(idx, item)
else:
    channel.append(item)

tree.write('appcast.xml', encoding='unicode', xml_declaration=True)
PYEOF

      - name: Commit appcast.xml
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add appcast.xml
          git commit -m "chore: update appcast for ${{ steps.ver.outputs.tag }}"
          git push origin HEAD:main

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "WorkTimer ${{ steps.ver.outputs.version }}"
          generate_release_notes: true
          files: ${{ steps.zip.outputs.zip }}
